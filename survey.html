<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>INF* 참여자 후기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FFF9F0;font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:48px 1.25rem 3rem}
.wrap{width:100%;max-width:520px;margin:0 auto}
.badge{display:inline-block;background:#FFE4F0;color:#B5006A;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:4px 14px;border-radius:20px;margin-bottom:14px}
.hero{text-align:center;margin-bottom:2rem}
.hero h1{font-size:24px;font-weight:700;color:#1A1A2E;line-height:1.3;margin-bottom:6px}
.hero p{font-size:13px;color:#78716C}
.card{background:#fff;border-radius:20px;border:1.5px solid #F0EBE3;padding:1.5rem;margin-bottom:1rem}
.card h3{font-size:13px;font-weight:700;color:#B5006A;letter-spacing:.5px;margin-bottom:1rem;text-transform:uppercase}
.q-label{font-size:14px;font-weight:500;color:#1A1A2E;margin-bottom:.75rem;line-height:1.5}
.star-row{display:flex;gap:8px;margin-bottom:.25rem}
.star{font-size:32px;cursor:pointer;filter:grayscale(1);transition:filter .15s,transform .15s;user-select:none}
.star.on{filter:none}
.star:hover{transform:scale(1.15)}
.ox-row{display:flex;gap:10px}
.oxbtn{flex:1;padding:12px;border-radius:12px;border:1.5px solid #F0EBE3;background:#fff;font-size:20px;cursor:pointer;transition:all .15s;font-family:inherit}
.oxbtn.sel{border-color:#F9A8D4;background:#FFF0F7}
textarea{width:100%;border:1.5px solid #F0EBE3;border-radius:12px;padding:12px 14px;font-size:16px;font-family:inherit;outline:none;resize:vertical;min-height:100px;transition:border-color .2s;line-height:1.6}
textarea:focus{border-color:#F9A8D4}
.submit-btn{width:100%;background:linear-gradient(135deg,#E0478A,#F97316);color:#fff;border:none;border-radius:16px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s;margin-top:.5rem}
.submit-btn:hover{opacity:.9}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.thankyou{display:none;text-align:center;padding:3rem 1rem}
.thankyou .emoji{font-size:56px;margin-bottom:1rem}
.thankyou h2{font-size:22px;font-weight:700;color:#1A1A2E;margin-bottom:.5rem}
.thankyou p{font-size:14px;color:#78716C}
</style>
</head>
<body>
<div class="wrap">
  <div id="form-area">
    <div class="hero">
      <div class="badge">✦ PARTICIPANT SURVEY ✦</div>
      <h1>INF<span style="color:#E0478A">*</span> 결사단<br>참여자 후기</h1>
      <p>솔직한 후기를 남겨주세요 💌</p>
    </div>

    <div class="card">
      <h3>이름</h3>
      <div class="q-label">이름을 입력해주세요</div>
      <input type="text" id="q0" placeholder="이름" style="width:100%;border:1.5px solid #F0EBE3;border-radius:12px;padding:12px 14px;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s" onfocus="this.style.borderColor='#F9A8D4'" onblur="this.style.borderColor='#F0EBE3'"/>
    </div>

    <div class="card">
      <h3>Q1</h3>
      <div class="q-label">모임에 만족하셨나요?</div>
      <div class="star-row" id="star-q1">
        <span class="star" onclick="setStar(1)">⭐</span>
        <span class="star" onclick="setStar(2)">⭐</span>
        <span class="star" onclick="setStar(3)">⭐</span>
        <span class="star" onclick="setStar(4)">⭐</span>
        <span class="star" onclick="setStar(5)">⭐</span>
      </div>
    </div>

    <div class="card">
      <h3>후기</h3>
      <div class="q-label">모임의 후기를 작성해주세요</div>
      <textarea id="q_review" placeholder="자유롭게 작성해주세요 ✍️"></textarea>
    </div>

    <div class="card">
      <h3>Q2</h3>
      <div class="q-label">이 모임에 합류하고 싶으신가요?</div>
      <div class="ox-row">
        <button class="oxbtn" id="q2o" onclick="setOX('q2',true)">⭕</button>
        <button class="oxbtn" id="q2x" onclick="setOX('q2',false)">❌</button>
      </div>
    </div>

    <div class="card">
      <h3>Q3</h3>
      <div class="q-label">모임의 장점을 알려주세요</div>
      <textarea id="q3" placeholder="자유롭게 작성해주세요 ✍️"></textarea>
    </div>

    <div class="card">
      <h3>Q4</h3>
      <div class="q-label">모임의 일원으로 도전해보시겠습니까?</div>
      <div class="ox-row">
        <button class="oxbtn" id="q4o" onclick="setOX('q4',true)">⭕</button>
        <button class="oxbtn" id="q4x" onclick="setOX('q4',false)">❌</button>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitSurvey()">설문 완료</button>
  </div>

  <div class="thankyou" id="thankyou">
    <div class="emoji">🎉</div>
    <h2>감사합니다!</h2>
    <p>소중한 후기가 잘 전달됐어요<br>INF* 결사단이 더 멋져질게요 💪</p>
  </div>
</div>

<script>
var NPOINT_URL='https://api.npoint.io/23e9f9b726ddf4495335';
var starVal=0, q2Val=null, q4Val=null;

function setStar(n){
  starVal=n;
  var stars=document.querySelectorAll('#star-q1 .star');
  stars.forEach(function(s,i){s.classList.toggle('on',i<n);});
}
function setOX(key,val){
  if(key==='q2'){
    q2Val=val;
    document.getElementById('q2o').classList.toggle('sel',val===true);
    document.getElementById('q2x').classList.toggle('sel',val===false);
  } else {
    q4Val=val;
    document.getElementById('q4o').classList.toggle('sel',val===true);
    document.getElementById('q4x').classList.toggle('sel',val===false);
  }
}
function submitSurvey(){
  if(!document.getElementById('q0').value.trim()){alert('이름을 입력해주세요');return;}
  if(!starVal){alert('만족도를 선택해주세요 ⭐');return;}
  if(q2Val===null){alert('Q2를 선택해주세요');return;}
  if(q4Val===null){alert('Q4를 선택해주세요');return;}
  var btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='제출 중...';
  var newEntry={
    name:document.getElementById('q0').value.trim(),
    date:new Date().toLocaleDateString('ko-KR'),
    review:document.getElementById('q_review').value.trim(),
    q1:starVal,
    q2:q2Val,
    q3:document.getElementById('q3').value.trim(),
    q4:q4Val
  };
  fetch(NPOINT_URL+'?t='+Date.now(),{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d||typeof d!=='object')d={};
      if(!Array.isArray(d.inf_survey))d.inf_survey=[];
      d.inf_survey.push(newEntry);
      return fetch(NPOINT_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
    })
    .then(function(){
      document.getElementById('form-area').style.display='none';
      document.getElementById('thankyou').style.display='block';
    })
    .catch(function(){
      btn.disabled=false;btn.textContent='설문 완료';
      alert('제출에 실패했어요. 다시 시도해주세요 🙏');
    });
}
</script>
</body>
</html>
