<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>INF* 비밀 영입 심사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>*{box-sizing:border-box;margin:0;padding:0}
body{background:#FFF9F0;font-family:'Noto Sans KR',sans-serif;min-height:100vh}
.page{display:none;min-height:100vh;padding:56px 2rem 3rem}.page.active{display:block}
.wrap{width:100%;max-width:600px;margin:0 auto}
.badge{display:inline-block;background:#FFE4F0;color:#B5006A;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:4px 14px;border-radius:20px;margin-bottom:14px}
.hero{text-align:center;margin-bottom:2.5rem}
.hero h1{font-size:28px;font-weight:700;color:#1A1A2E;line-height:1.3;margin-bottom:8px}
.hero h1 em{font-style:normal;color:#E0478A}
.hero p{font-size:13px;color:#78716C}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:#78716C;font-size:13px;cursor:pointer;margin-bottom:24px;background:none;border:none;font-family:inherit;padding:0}
.back-btn:hover{color:#E0478A}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.mcard{background:#fff;border-radius:24px;border:1.5px solid #F0EBE3;padding:2rem 1rem 1.75rem;display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.mcard::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#F472B6,#FB923C)}
.mcard:hover{border-color:#F9A8D4;transform:translateY(-4px);box-shadow:0 12px 28px rgba(224,71,138,.14)}
.avatar{width:120px;height:120px;border-radius:50%;overflow:hidden;border:3px solid #FBCFE8;box-shadow:0 4px 14px rgba(224,71,138,.15)}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:center top}
.mname{font-size:17px;font-weight:700;color:#1A1A2E}.mrole{font-size:12px;color:#A89F97}
.judge-header{display:flex;align-items:center;gap:14px;background:#fff;border-radius:20px;border:1.5px solid #F0EBE3;padding:1.25rem 1.5rem;margin-bottom:1.5rem}
.jav-wrap{width:64px;height:64px;border-radius:50%;overflow:hidden;border:3px solid #FBCFE8;flex-shrink:0}
.jav-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top}
.judge-info h2{font-size:18px;font-weight:700;color:#1A1A2E}.judge-info p{font-size:12px;color:#A89F97;margin-top:2px}
.form-section{background:#fff;border-radius:20px;border:1.5px solid #F0EBE3;padding:1.5rem;margin-bottom:1rem}
.form-section h3{font-size:13px;font-weight:700;color:#B5006A;letter-spacing:.5px;margin-bottom:1rem;text-transform:uppercase}
.form-row{margin-bottom:1rem}.form-row label{display:block;font-size:13px;font-weight:500;color:#78716C;margin-bottom:6px}
.fi{width:100%;border:1.5px solid #F0EBE3;border-radius:12px;padding:10px 14px;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s}
.fi:focus{border-color:#F9A8D4}
.star-row{display:flex;gap:6px}.star{font-size:28px;cursor:pointer;filter:grayscale(1);transition:filter .15s,transform .15s;user-select:none}.star.on{filter:none}.star:hover{transform:scale(1.15)}
textarea.fi{resize:vertical;min-height:90px;font-size:13px}
.rec-btns{display:flex;gap:10px}.rb{flex:1;padding:10px;border-radius:12px;border:1.5px solid #F0EBE3;background:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;color:#78716C}
.rb.sel{border-color:#F9A8D4;background:#FFF0F7;color:#B5006A}
.submit-btn{width:100%;background:linear-gradient(135deg,#E0478A,#F97316);color:#fff;border:none;border-radius:16px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s;margin-top:1rem}
.submit-btn:hover{opacity:.9}
.history-empty{text-align:center;color:#A89F97;padding:3rem 0;font-size:14px}
.cg{background:#fff;border-radius:20px;border:1.5px solid #F0EBE3;overflow:hidden;margin-bottom:1rem}
.cg-hd{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;cursor:pointer;border-bottom:1px solid #F0EBE3}
.cg-hd h3{font-size:15px;font-weight:700;color:#1A1A2E}
.sc{font-size:11px;color:#A89F97;background:#FFF0F7;padding:3px 10px;border-radius:20px}
.slip-list{padding:0 1.25rem}
.slip{display:flex;align-items:center;gap:10px;padding:.875rem 0;border-bottom:1px solid #F9F5F0;cursor:pointer}
.slip:last-child{border-bottom:none}
.sav{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid #FBCFE8;flex-shrink:0}
.sav img{width:100%;height:100%;object-fit:cover;object-position:center top}
.sinfo{flex:1}.sname{font-size:13px;font-weight:600;color:#1A1A2E}.sdate{font-size:11px;color:#A89F97;margin-top:1px}
.rb2{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.rb2.y{background:#FFE4F0;color:#B5006A}.rb2.n{background:#F3F4F6;color:#9CA3AF}
.cand-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.cchip{padding:8px 16px;border-radius:50px;border:1.5px solid #F0EBE3;background:#fff;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;color:#1A1A2E}
.cchip:hover{border-color:#F9A8D4;background:#FFF0F7}
.cchip.sel{border-color:#E0478A;background:#FFE4F0;color:#B5006A}
.new-cand-btn{padding:8px 16px;border-radius:50px;border:1.5px dashed #D1C9C2;background:transparent;font-size:14px;cursor:pointer;font-family:inherit;color:#A89F97;transition:all .15s}
.new-cand-btn:hover{border-color:#F9A8D4;color:#E0478A}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border-radius:28px;padding:2rem 1.5rem 1.5rem;width:100%;max-width:320px;text-align:center}
.modal h2{font-size:18px;font-weight:700;color:#1A1A2E;margin-bottom:4px}
.modal p{font-size:13px;color:#A89F97;margin-bottom:1.5rem}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:1.5rem}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#F0EBE3;transition:background .15s}
.pin-dot.filled{background:#E0478A}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kbtn{padding:14px;border-radius:16px;border:none;background:#FFF9F0;font-size:20px;font-weight:600;cursor:pointer;font-family:inherit;color:#1A1A2E;transition:background .1s}
.kbtn:hover{background:#FFE4F0}
.kbtn.del{font-size:16px;color:#A89F97}
.modal-err{color:#E0478A;font-size:13px;min-height:18px;margin-top:8px}
.reset-btn{position:absolute;top:10px;right:10px;background:none;border:none;font-size:11px;color:#C9C0B8;cursor:pointer;font-family:inherit;padding:4px 6px;border-radius:8px;z-index:2}
.reset-btn:hover{color:#E0478A;background:#FFF0F7}
.mcard{position:relative}
.dc{background:#fff;border-radius:20px;border:1.5px solid #F0EBE3;padding:1.5rem;margin-bottom:1rem}
.dc h3{font-size:13px;font-weight:700;color:#B5006A;letter-spacing:.5px;margin-bottom:.75rem}
.dj{display:flex;align-items:center;gap:10px;margin-bottom:.5rem}
.dav{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid #FBCFE8;flex-shrink:0}
.dav img{width:100%;height:100%;object-fit:cover;object-position:center top}
.djn{font-size:14px;font-weight:600;color:#1A1A2E}
.dcmt{font-size:13px;color:#4B4543;line-height:1.6;margin-top:.5rem;padding:10px 12px;background:#FFF9F0;border-radius:10px}
.smry{display:flex;flex-direction:column;align-items:center;gap:.75rem;text-align:center;padding:1rem 0}
.smry .val{font-size:32px;font-weight:700;color:#E0478A}.smry .lbl{font-size:12px;color:#A89F97;margin-top:2px}
@media(max-width:480px){.avatar{width:76px;height:76px}.mcard{padding:1.25rem .6rem 1.1rem;gap:10px}.mname{font-size:15px}.mrole{font-size:11px}}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A2E;color:#fff;padding:12px 24px;border-radius:50px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.cfw{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;z-index:9999}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.cf{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall linear forwards}</style>
</head>

// ── Firebase 공유 저장소 ───────────────────────────────────────────
// Firebase Realtime Database URL을 아래에 붙여넣으세요.
// 예) 'https://your-project-default-rtdb.firebaseio.com'
// null이면 기기별 로컬 저장만 사용합니다.
var DB_URL=null;

function _fbUrl(){return DB_URL?DB_URL.replace(/\/$/,'')+'/inf.json':null;}
function syncFromFirebase(cb){
  var url=_fbUrl();
  if(!url){if(cb)cb();return;}
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){
      if(d&&typeof d==='object'){
        if(d.inf_h2!=null)localStorage.setItem('inf_h2',JSON.stringify(d.inf_h2));
        if(d.inf_questions!=null)localStorage.setItem('inf_questions',JSON.stringify(d.inf_questions));
        if(d.inf_pins!=null)localStorage.setItem('inf_pins',JSON.stringify(d.inf_pins));
      }
      if(cb)cb();
    })
    .catch(function(){if(cb)cb();});
}
function saveToFirebase(){
  var url=_fbUrl();if(!url)return;
  var d={
    inf_h2:JSON.parse(localStorage.getItem('inf_h2')||'{}'),
    inf_questions:JSON.parse(localStorage.getItem('inf_questions')||'null'),
    inf_pins:JSON.parse(localStorage.getItem('inf_pins')||'null')
  };
  fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(function(){});
}
window.addEventListener('load',function(){syncFromFirebase();});

// 설문 질문 관리
var DEFAULT_QUESTIONS=[
  {key:'q0',label:'분위기 & 케미 ✨',type:'star'},
  {key:'q1',label:'성격 & 인성 💛',type:'star'},
  {key:'q2',label:'재미있는 사람 😂',type:'star'}
];
function getQuestions(){
  try{var s=localStorage.getItem('inf_questions');if(s)return JSON.parse(s);}catch(e){}
  return DEFAULT_QUESTIONS.slice();
}
function saveQuestions(q){localStorage.setItem('inf_questions',JSON.stringify(q));}
var _surveyDraft=[];
function openSurveyEditor(){
  _surveyDraft=getQuestions().map(function(q){return {key:q.key,label:q.label,type:q.type||'star'};});
  renderSurveyItems();
  document.getElementById('survey-modal').style.display='flex';
}
function closeSurveyEditor(){document.getElementById('survey-modal').style.display='none';}
var _dragIdx=null;
function renderSurveyItems(){
  var el=document.getElementById('survey-items');
  el.innerHTML=_surveyDraft.map(function(q,i){
    var isStar=(q.type||'star')==='star';
    return '<div draggable="true" data-i="'+i+'" ondragstart="surveyDragStart(event,'+i+')" ondragover="surveyDragOver(event,'+i+')" ondrop="surveyDrop(event,'+i+')" ondragend="surveyDragEnd()" '
      +'style="display:flex;align-items:center;gap:6px;margin-bottom:8px;transition:opacity .15s" id="sitem-'+i+'">'
      +'<span style="cursor:grab;color:#C9C0B8;font-size:16px;flex-shrink:0;padding:0 1px;user-select:none;touch-action:none" '
        +'onmousedown="this.style.cursor=\'grabbing\'" onmouseup="this.style.cursor=\'grab\'">⠿</span>'
      +'<input value="'+q.label+'" oninput="_surveyDraft['+i+'].label=this.value" style="flex:1;min-width:0;border:1.5px solid #F0EBE3;border-radius:10px;padding:8px 10px;font-size:16px;font-family:inherit;outline:none"/>'
      +'<div style="display:flex;border:1.5px solid #F0EBE3;border-radius:10px;overflow:hidden;flex-shrink:0">'
        +'<button onclick="_surveyDraft['+i+'].type=\'star\';renderSurveyItems()" style="padding:6px 8px;border:none;font-size:13px;cursor:pointer;background:'+(isStar?'#FFE4F0':'#fff')+';color:'+(isStar?'#B5006A':'#A89F97')+'">⭐</button>'
        +'<button onclick="_surveyDraft['+i+'].type=\'ox\';renderSurveyItems()" style="padding:6px 8px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:'+(!isStar?'#FFE4F0':'#fff')+';color:'+(!isStar?'#B5006A':'#A89F97')+'">OX</button>'
      +'</div>'
      +'<button onclick="_surveyDraft.splice('+i+',1);renderSurveyItems()" style="background:none;border:none;color:#F87171;font-size:18px;cursor:pointer;flex-shrink:0;padding:0 2px;line-height:1">×</button>'
      +'</div>';
  }).join('');
}
function surveyDragStart(e,i){
  _dragIdx=i;
  e.dataTransfer.effectAllowed='move';
  setTimeout(function(){var el=document.getElementById('sitem-'+i);if(el)el.style.opacity='0.4';},0);
}
function surveyDragOver(e,i){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  // 드래그 중 위치 미리보기
  document.querySelectorAll('[id^="sitem-"]').forEach(function(el){el.style.borderTop='';el.style.borderBottom='';});
  var el=document.getElementById('sitem-'+i);
  if(el&&_dragIdx!==null&&_dragIdx!==i){
    if(i>_dragIdx)el.style.borderBottom='2px solid #E0478A';
    else el.style.borderTop='2px solid #E0478A';
  }
}
function surveyDrop(e,i){
  e.preventDefault();
  if(_dragIdx===null||_dragIdx===i)return;
  var moved=_surveyDraft.splice(_dragIdx,1)[0];
  var target=_dragIdx<i?i-1:i;
  _surveyDraft.splice(target,0,moved);
  _dragIdx=null;
  renderSurveyItems();
}
function surveyDragEnd(){
  _dragIdx=null;
  document.querySelectorAll('[id^="sitem-"]').forEach(function(el){el.style.opacity='';el.style.borderTop='';el.style.borderBottom='';});
}
function addSurveyItem(){
  var maxKey=0;
  _surveyDraft.forEach(function(q){var n=parseInt(q.key.replace('q',''));if(n>maxKey)maxKey=n;});
  _surveyDraft.push({key:'q'+(maxKey+1),label:'',type:'star'});
  renderSurveyItems();
  var inputs=document.getElementById('survey-items').querySelectorAll('input');
  if(inputs.length)inputs[inputs.length-1].focus();
}
function saveSurveyEditor(){
  var valid=_surveyDraft.filter(function(q){return q.label.trim();});
  if(!valid.length){alert('항목을 하나 이상 입력해주세요');return;}
  saveQuestions(valid);
  saveToFirebase();
  closeSurveyEditor();
  showToast('설문지가 저장됐어요 ✓');
}
function renderFormQuestions(){
  var qs=getQuestions();
  scores={};
  var html=qs.map(function(q){
    scores[q.key]=null;
    if((q.type||'star')==='ox'){
      return '<div class="form-row"><label>'+q.label+'</label>'
        +'<div style="display:flex;gap:10px" id="ox-'+q.key+'">'
        +'<button class="rb" id="oxo-'+q.key+'" onclick="setOX(\''+q.key+'\',true)" style="font-size:18px">⭕</button>'
        +'<button class="rb" id="oxx-'+q.key+'" onclick="setOX(\''+q.key+'\',false)" style="font-size:18px">❌</button>'
        +'</div></div>';
    }
    scores[q.key]=0;
    return '<div class="form-row"><label>'+q.label+'</label><div class="star-row" id="star-'+q.key+'"></div></div>';
  }).join('');
  document.getElementById('score-rows').innerHTML=html;
  qs.forEach(function(q){if((q.type||'star')==='star')renderStars('star-'+q.key,q.key,0);});
}
function setOX(key,val){
  scores[key]=val;
  document.getElementById('oxo-'+key).classList.toggle('sel',val===true);
  document.getElementById('oxx-'+key).classList.toggle('sel',val===false);
}
function getAvgScore(slip){
  if(slip.scores){
    var qs=getQuestions();
    var vals=[];
    qs.forEach(function(q){
      if((q.type||'star')==='star'){
        var v=slip.scores[q.key];
        if(v>0)vals.push(v);
      }
    });
    return vals.length?Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length):0;
  }
  return Math.round(((slip.a||0)+(slip.b||0)+(slip.c||0))/3);
}

// PIN
var _pinName='',_pinKey='',_pinInput='',_pinMode='',_pinNew='';
// inf_pins: {"min":{"pwd":"0000","set":false}, ...}
function getPins(){
  var d={min:{pwd:'0000',set:false},en:{pwd:'0000',set:false},yu:{pwd:'0000',set:false}};
  try{var s=localStorage.getItem('inf_pins');if(s)d=JSON.parse(s);}catch(e){}
  return d;
}
function savePins(p){localStorage.setItem('inf_pins',JSON.stringify(p));}
function checkPin(name,key){
  _pinName=name;_pinKey=key;
  var pins=getPins();
  if(!pins[key].set){
    _pinMode='change_new';
    openModal(name+' 비밀번호 설정','새 PIN 4자리를 입력해주세요 (기본 0000 유지도 가능)');
  } else {
    _pinMode='enter';
    openModal(name,'PIN을 입력해주세요');
  }
}
function openModal(title,sub){
  _pinInput='';_pinNew='';updateDots();
  document.getElementById('pin-title').textContent=title;
  document.getElementById('pin-sub').textContent=sub;
  document.getElementById('pin-err').textContent='';
  document.getElementById('pin-modal').style.display='flex';
}
function pinKey(k){
  if(_pinInput.length>=4)return;
  _pinInput+=k;updateDots();
  if(_pinInput.length===4)setTimeout(pinSubmit,150);
}
function pinDel(){_pinInput=_pinInput.slice(0,-1);updateDots();}
function updateDots(){
  for(var i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('filled',i<_pinInput.length);
}
function pinSubmit(){
  var pins=getPins();
  if(_pinMode==='enter'){
    if(_pinInput===pins[_pinKey].pwd){
      document.getElementById('pin-modal').style.display='none';
      selectMember(_pinName,_pinKey);
    } else {
      document.getElementById('pin-err').textContent='비밀번호가 틀렸어요';
      _pinInput='';updateDots();
    }
  } else if(_pinMode==='change_new'){
    _pinNew=_pinInput;_pinInput='';
    _pinMode='change_confirm';
    document.getElementById('pin-sub').textContent='한 번 더 입력해서 확인해주세요';
    document.getElementById('pin-err').textContent='';
    updateDots();
  } else if(_pinMode==='change_confirm'){
    if(_pinInput===_pinNew){
      pins[_pinKey]={pwd:_pinNew,set:true};
      savePins(pins);
      saveToFirebase();
      document.getElementById('pin-modal').style.display='none';
      selectMember(_pinName,_pinKey);
    } else {
      document.getElementById('pin-err').textContent='일치하지 않아요. 다시 입력해주세요';
      _pinInput='';updateDots();
      // change_confirm 유지 — 처음으로 돌아가지 않음
    }
  }
}
function pinCancel(){document.getElementById('pin-modal').style.display='none';}
function resetPin(key){
  var pins=getPins();pins[key]={pwd:'0000',set:false};savePins(pins);
  showToast('비밀번호가 초기화됐어요 (0000)');
}
function goPage(id){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.getElementById(id).classList.add('active');window.scrollTo(0,0);if(id==='p3')renderHistory();}
function selectMember(name,key){
  curJudge=name;curKey=key;
  document.getElementById('jname').textContent=name;
  document.getElementById('jav-img').src=IMGS[key];
  curRec=null;
  document.getElementById('cname').value='';
  document.getElementById('cmnt').value='';
  document.getElementById('ryes').classList.remove('sel');
  document.getElementById('rno').classList.remove('sel');
  renderFormQuestions();
  renderCandPicker();
  goPage('p2');
}
function renderCandPicker(){
  var hist=JSON.parse(localStorage.getItem('inf_h2')||'{}');
  var keys=Object.keys(hist).filter(function(cn){
    return !hist[cn].some(function(s){return s.judge===curJudge;});
  });
  var area=document.getElementById('cand-pick-area');
  var row=document.getElementById('cname-row');
  if(!keys.length){
    area.innerHTML='';
    row.style.display='block';
    return;
  }
  var chips=keys.map(function(cn){
    return '<button class="cchip" onclick="pickCand(\''+cn+'\')" id="chip-'+cn+'">'+cn+'</button>';
  }).join('');
  area.innerHTML='<div class="form-row"><label>후보자 선택</label><div class="cand-chips">'+chips+'<button class="new-cand-btn" onclick="showNewInput()">+ 새 후보자</button></div></div>';
  row.style.display='none';
}
function pickCand(name){
  document.querySelectorAll('.cchip').forEach(function(c){c.classList.remove('sel');});
  var chip=document.getElementById('chip-'+name);
  if(chip)chip.classList.add('sel');
  document.getElementById('cname').value=name;
  document.getElementById('cname-row').style.display='none';
}
function showNewInput(){
  document.querySelectorAll('.cchip').forEach(function(c){c.classList.remove('sel');});
  document.getElementById('cname').value='';
  document.getElementById('cname-row').style.display='block';
  document.getElementById('dupe-warn').style.display='none';
  document.getElementById('cname').focus();
}
function checkDupeName(){
  var val=document.getElementById('cname').value.trim();
  var hist=JSON.parse(localStorage.getItem('inf_h2')||'{}');
  var isDupe=val.length>0 && !!hist[val];
  document.getElementById('dupe-warn').style.display=isDupe?'block':'none';
}
function renderStars(cid,key,val){
  var c=document.getElementById(cid);c.innerHTML='';
  for(var i=1;i<=5;i++){
    var s=document.createElement('span');
    s.className='star'+(i<=val?' on':'');s.textContent='⭐';
    (function(v,k,ci){s.onclick=function(){scores[k]=v;renderStars(ci,k,v);};})(i,key,cid);
    c.appendChild(s);
  }
}
renderFormQuestions();
function setRec(v){curRec=v;document.getElementById('ryes').classList.toggle('sel',v===true);document.getElementById('rno').classList.toggle('sel',v===false);}
function submitForm(){
  var name=document.getElementById('cname').value.trim();
  if(!name){showToast('후보자 이름을 입력해주세요');return;}
  var hasScore=Object.keys(scores).some(function(k){return scores[k]>0;});
  if(!hasScore){showToast('평가 점수를 입력해주세요');return;}
  if(curRec===null){showToast('추천 여부를 선택해주세요');return;}
  var hist=JSON.parse(localStorage.getItem('inf_h2')||'{}');
  if(!hist[name])hist[name]=[];
  var newSlip={judge:curJudge,judgeKey:curKey,scores:JSON.parse(JSON.stringify(scores)),comment:document.getElementById('cmnt').value.trim(),rec:curRec,date:new Date().toLocaleDateString('ko-KR')};
  if(window._editMode===name){
    for(var i=0;i<hist[name].length;i++){if(hist[name][i].judge===curJudge){hist[name][i]=newSlip;break;}}
    window._editMode=null;
  } else {
    for(var i=0;i<hist[name].length;i++){if(hist[name][i].judge===curJudge){showToast('이미 이 후보자를 심사했어요!');return;}}
    hist[name].push(newSlip);
  }
  localStorage.setItem('inf_h2',JSON.stringify(hist));
  saveToFirebase();
  confetti();showToast('심사가 완료되었어요 🎉');
  setTimeout(function(){goPage('p3');},1000);
}
function stars(n){var s='';for(var i=0;i<n;i++)s+='⭐';return s;}
function renderHistory(){
  var hist=JSON.parse(localStorage.getItem('inf_h2')||'{}');
  var el=document.getElementById('hlist');
  var keys=Object.keys(hist);
  if(!keys.length){el.innerHTML='<div class="history-empty">아직 심사 기록이 없어요</div>';return;}
  var html='';
  for(var ki=0;ki<keys.length;ki++){
    var cn=keys[ki];var slips=hist[cn];var items='';
    for(var si=0;si<slips.length;si++){
      var s=slips[si];var avg=getAvgScore(s);
      var delBtn=(s.judge===curJudge)?'<button onclick="event.stopPropagation();deleteSlip(\''+cn+'\',\''+s.judge+'\')" style="background:none;border:1.5px solid #FECDD3;border-radius:20px;padding:3px 10px;font-size:11px;color:#F87171;cursor:pointer;font-family:inherit;flex-shrink:0">삭제</button>':'';
      items+='<div class="slip" onclick="showDetail(\''+cn+'\')"><div class="sav"><img src="'+IMGS[s.judgeKey]+'" alt="'+s.judge+'"/></div><div class="sinfo"><div class="sname">'+s.judge+'</div><div class="sdate">'+s.date+'</div></div><div style="display:flex;align-items:center;gap:8px">'+stars(avg)+delBtn+'</div></div>';
    }
    html+='<div class="cg"><div class="cg-hd"><div onclick="showDetail(\''+cn+'\')" style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer"><h3>'+cn+'</h3><span class="sc">'+slips.length+'/3 심사</span></div><button onclick="deleteCandidate(\''+cn+'\')" style="background:none;border:1.5px solid #FECDD3;border-radius:20px;padding:4px 12px;font-size:12px;color:#F87171;cursor:pointer;font-family:inherit;flex-shrink:0">전체 삭제</button></div><div class="slip-list">'+items+'</div></div>';
  }
  el.innerHTML=html;
}
function showDetail(cname){
  var hist=JSON.parse(localStorage.getItem('inf_h2')||'{}');
  var slips=hist[cname]||[];
  document.getElementById('dcname').textContent=cname;
  var tot=0;for(var i=0;i<slips.length;i++)tot+=getAvgScore(slips[i]);
  var avg=slips.length?Math.round(tot/slips.length):0;
  var recs=0;for(var i=0;i<slips.length;i++)if(slips[i].rec)recs++;
  var finalRec='';
  if(slips.length>=3){
    var majority=recs>=2;
    finalRec='<div style="margin-top:1rem;padding:14px 20px;border-radius:14px;font-size:15px;font-weight:700;text-align:center;background:'+(majority?'#FFE4F0':'#F3F4F6')+';color:'+(majority?'#B5006A':'#6B7280')+'">'+(majority?'✅ 최종 영입 추천':'❌ 아직은 보류')+'</div>';
  } else {
    finalRec='<div style="margin-top:1rem;padding:12px 20px;border-radius:14px;font-size:13px;text-align:center;background:#F9F5F0;color:#A89F97">🔒 심사위원 '+slips.length+'/3 완료 — 결과는 3명 모두 심사 후 공개돼요</div>';
  }
  document.getElementById('dsmry').innerHTML='<div><div class="val">'+stars(avg)+'</div><div class="lbl">평균 '+avg+'점</div></div>'+finalRec;
  var sh='';
  for(var i=0;i<slips.length;i++){
    var s=slips[i];
    var isMine=(s.judge===curJudge);
    var btns=isMine?'<div style="display:flex;gap:6px"><button onclick="editSlip(\''+cname+'\',\''+s.judge+'\')" style="background:none;border:1.5px solid #F0EBE3;border-radius:20px;padding:4px 12px;font-size:12px;color:#78716C;cursor:pointer;font-family:inherit">수정</button><button onclick="deleteSlip(\''+cname+'\',\''+s.judge+'\')" style="background:none;border:1.5px solid #FECDD3;border-radius:20px;padding:4px 12px;font-size:12px;color:#F87171;cursor:pointer;font-family:inherit">삭제</button></div>':'';
    var qs=getQuestions();
    var scoreHtml=qs.map(function(q){
      var v=s.scores?s.scores[q.key]:(q.key==='q0'?s.a:q.key==='q1'?s.b:s.c)||0;
      var disp=(q.type||'star')==='ox'?(v===true?'⭕':(v===false?'❌':'—')):stars(v||0);
      return '<div>'+q.label+' '+disp+'</div>';
    }).join('');
    sh+='<div class="dc"><div class="dj" style="justify-content:space-between"><div style="display:flex;align-items:center;gap:10px"><div class="dav"><img src="'+IMGS[s.judgeKey]+'" alt="'+s.judge+'"/></div><div class="djn">'+s.judge+'</div></div>'+btns+'</div><div style="display:flex;flex-direction:column;gap:4px;font-size:13px;color:#78716C;margin:8px 0">'+scoreHtml+'</div>'+(s.comment?'<div class="dcmt">💬 '+s.comment+'</div>':'')+'</div>';
  }
  document.getElementById('dslips').innerHTML=sh;
  goPage('p4');
}
function deleteCandidate(cname){
  if(!confirm('"'+cname+'" 후보자의 심사 기록을 전부 삭제할까요?'))return;
  var hist=JSON.parse(localStorage.getItem('inf_h2')||'{}');
  delete hist[cname];
  localStorage.setItem('inf_h2',JSON.stringify(hist));
  saveToFirebase();
  showToast('"'+cname+'" 기록이 삭제됐어요');
  renderHistory();
}
function deleteSlip(cname,judgeName){
  if(!confirm('"'+cname+'"의 심사 기록을 삭제할까요?'))return;
  var hist=JSON.parse(localStorage.getItem('inf_h2')||'{}');
  if(!hist[cname])return;
  hist[cname]=hist[cname].filter(function(s){return s.judge!==judgeName;});
  if(!hist[cname].length)delete hist[cname];
  localStorage.setItem('inf_h2',JSON.stringify(hist));
  saveToFirebase();
  showToast('삭제됐어요');
  // 현재 페이지에 따라 갱신
  if(document.getElementById('p4').classList.contains('active')){
    if(hist[cname])showDetail(cname);else goPage('p3');
  } else {
    renderHistory();
  }
}
function editSlip(cname,judgeName){
  var hist=JSON.parse(localStorage.getItem('inf_h2')||'{}');
  var slips=hist[cname]||[];
  var s=null;
  for(var i=0;i<slips.length;i++){if(slips[i].judge===judgeName){s=slips[i];break;}}
  if(!s)return;
  curJudge=s.judge;curKey=s.judgeKey;curRec=s.rec;
  document.getElementById('jname').textContent=s.judge;
  document.getElementById('jav-img').src=IMGS[s.judgeKey];
  document.getElementById('cmnt').value=s.comment||'';
  document.getElementById('ryes').classList.toggle('sel',s.rec===true);
  document.getElementById('rno').classList.toggle('sel',s.rec===false);
  renderFormQuestions();
  // 기존 점수 복원 (신규/구버전 포맷 모두 지원)
  var qs=getQuestions();
  qs.forEach(function(q){
    var v=s.scores?s.scores[q.key]:(q.key==='q0'?s.a:q.key==='q1'?s.b:s.c)||0;
    scores[q.key]=v;
    if((q.type||'star')==='ox'){setOX(q.key,v);}
    else{renderStars('star-'+q.key,q.key,v||0);}
  });
  // 후보자 이름 고정 (수정 모드)
  var area=document.getElementById('cand-pick-area');
  area.innerHTML='<div class="form-row"><label>후보자</label><div style="padding:10px 14px;background:#F9F5F0;border-radius:12px;font-size:15px;font-weight:600;color:#1A1A2E">'+cname+'</div></div>';
  document.getElementById('cname').value=cname;
  document.getElementById('cname-row').style.display='none';
  // submitForm이 중복 체크를 건너뛰도록 수정 플래그
  window._editMode=cname;
  goPage('p2');
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function confetti(){
  var w=document.getElementById('cfw');w.innerHTML='';
  var cols=['#F472B6','#FB923C','#FCD34D','#6EE7B7','#93C5FD'];
  for(var i=0;i<60;i++){var c=document.createElement('div');c.className='cf';c.style.cssText='left:'+Math.random()*100+'%;top:-10px;background:'+cols[Math.floor(Math.random()*5)]+';animation-duration:'+(0.8+Math.random()*1.4)+'s;animation-delay:'+Math.random()*0.5+'s';w.appendChild(c);}
  setTimeout(function(){w.innerHTML='';},2500);
}
</script>
</body></html>
